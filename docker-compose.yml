# ─────────────────────────────────────────────────────────────────────────────
# Custom Guardrails Demo
#
# Services:
#   guardrail-service → Custom Python moderation API (port 8080)
#
# Kong Gateway runs externally (hosted DB-less mode).
# Use startup.sh to configure and launch everything.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Custom Guardrail Service ───────────────────────────────────────────────
  guardrail-service:
    build:
      context: ./guardrail-service
      dockerfile: Dockerfile
    ports:
      - "8088:8080"   # Direct access for testing / debugging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure
