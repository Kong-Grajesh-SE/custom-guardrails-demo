# Kong Gateway declarative configuration (DB-less mode)
#
# Stack:
#   Kong Gateway Enterprise 3.14+  →  hosted (DB-less)
#   Mistral AI                     →  https://api.mistral.ai/v1
#   Guardrail service              →  http://<GUARDRAIL_HOST>:8080
#
# Flow:
#   Client  →  Kong (AI Proxy)  →  Mistral AI
#                     ↕
#              AI Custom Guardrail
#                     ↕
#          Custom Guardrail Service (Python)
#
# NOTE: Replace GUARDRAIL_URL and MISTRAL_API_KEY before loading.
#       The startup.sh script does this automatically.

_format_version: "3.0"

services:
  - name: ai-guardrail-demo
    url: https://api.mistral.ai/v1
    tags:
      - guardrail-demo

    routes:
      - name: chat-route
        paths:
          - /chat
        methods:
          - POST
        protocols:
          - http
          - https
        strip_path: true
        tags:
          - guardrail-demo

    plugins:
      # ── 1. AI Proxy: forward requests to Mistral AI ─────────────────────
      - name: ai-proxy
        tags:
          - guardrail-demo
        config:
          route_type: llm/v1/chat
          model:
            provider: mistral
            name: mistral-small-latest
            options:
              mistral_format: openai
          auth:
            header_name: Authorization
            header_value: "Bearer MISTRAL_API_KEY_PLACEHOLDER"

      # ── 2. AI Custom Guardrail: inspect INPUT and OUTPUT ─────────────────
      - name: ai-custom-guardrail
        tags:
          - guardrail-demo
        config:
          # Inspect both the incoming request AND the LLM response
          guarding_mode: BOTH

          # Send the full conversation text (all messages joined) to the
          # guardrail service for evaluation
          text_source: concatenate_all_content

          # Kill the request if the guardrail service is unreachable
          stop_on_error: true

          # Skip SSL for the internal guardrail service call
          ssl_verify: false

          # Timeout (ms) waiting for the guardrail service
          timeout: 5000

          # How Kong calls the guardrail service ───────────────────────────
          request:
            url: GUARDRAIL_URL_PLACEHOLDER/moderate
            body:
              # $(content) = the text being inspected (request or response)
              # $(source)  = "INPUT" or "OUTPUT" (set automatically by Kong)
              text: "$(content)"
              source: "$(source)"

          # How Kong reads the guardrail service response ──────────────────
          response:
            # resp.block         → boolean returned by the guardrail service
            # resp.block_message → human-readable reason string
            block: "$(resp.block)"
            block_message: "$(resp.block_message)"

          # Optional: surface guardrail decisions in Kong logs ─────────────
          metrics:
            block_reason: "$(resp.block_message)"
